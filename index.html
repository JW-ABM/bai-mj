<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>留給妳</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: #000; font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif; overflow: hidden; }
        
        /* 密碼層樣式 */
        #password-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: opacity 1s ease;
        }
        #password-overlay input {
            background: transparent; border: none; border-bottom: 1px solid #d4af37;
            color: #d4af37; text-align: center; font-size: 24px; letter-spacing: 10px;
            width: 200px; padding: 10px; outline: none; margin-bottom: 20px;
            border-radius: 0; -webkit-appearance: none;
        }
        #password-overlay p { color: rgba(212, 175, 55, 0.6); font-size: 14px; letter-spacing: 2px; }

        .container { height: 100vh; overflow-y: auto; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; visibility: hidden; }
        .page { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #000; flex-shrink: 0; }

        .text-content { width: 85%; text-align: center; opacity: 0; transition: opacity 2s ease-in-out 0.5s; }
        .page.active .text-content { opacity: 1; }
        .text-content p { color: rgba(255, 255, 255, 0.85); font-size: 18px; line-height: 2.8; letter-spacing: 0.18em; margin-bottom: 12px; }
        .highlight { color: #d4af37 !important; font-size: 19px !important; font-weight: 500; margin-top: 30px; display: block; line-height: 1.6; }
        .audio-tip { font-size: 12px; color: rgba(212, 175, 55, 0.4); margin-top: 40px; display: block; }

        .page img { max-width: 90%; max-height: 80%; object-fit: contain; opacity: 0; transition: opacity 2.5s ease-in-out; }
        .page.active img { opacity: 0.9; }

        #music-toggle { position: fixed; top: 30px; right: 25px; z-index: 1000; font-size: 24px; color: #d4af37; cursor: pointer; opacity: 0.5; }
        #music-toggle.playing { animation: rotate 6s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .exit-link { position: fixed; bottom: 35px; left: 25px; z-index: 1000; color: #d4af37; font-size: 14px; text-decoration: none; letter-spacing: 4px; opacity: 0; pointer-events: none; border-bottom: 1px solid rgba(212, 175, 55, 0.2); padding-bottom: 3px; }
        .exit-link.triggered { pointer-events: auto; animation: stealthEffect 10s infinite; }
        @keyframes stealthEffect { 0%, 80% { opacity: 0; } 85%, 95% { opacity: 0.6; } 100% { opacity: 0; } }
    </style>
</head>
<body>

<div id="password-overlay">
    <input type="password" id="pw-input" maxlength="3" autofocus>
    <p>輸入密碼進入</p>
</div>

<audio id="bgm" src="bgm.mp3" loop preload="auto"></audio>
<div id="music-toggle">♫</div>
<a href="https://abm-mj.pages.dev" target="_blank" class="exit-link" id="exit-btn">忍住</a>

<div class="container" id="main-scroll"></div>

<script>
// 使用反引號 ` 可以支持文案換行，並且移除了多餘的引號
const albumData = [
    {
        img: "1.jpg",
        text: [`素顏直視鏡頭的人，心裡都有底氣。`, `你就是那種，不需要任何包裝，`, `站在那裡就已經贏了的人。`],
        gold: "你本人，就是最好的作品。",
        first: true
    },
    {
        img: "2.jpg",
        text: [`你側臉的角度，讓人覺得你在想什麼很重要的事。`, `我猜你平時腦子轉得很快，主意多，又不輕易說出來。`, `這種人，聰明，也有趣。`],
        gold: "我越來越好奇你了。"
    },
    {
        img: "3.jpg",
        text: [`你笑起來的時候，整張圖都亮了。`, `我在日本這邊看見，突然覺得今天心情很好。`, `你大概不知道，`],
        gold: "你隨便一笑，能讓人高興很久。"
    },
    {
        img: "4.jpg",
        text: [`這張你拍得很隨意，但偏偏最好看。`, `從容的人才能拍出這種感覺。`, `你把自己活得很好，`],
        gold: "這比什麼都難，也比什麼都迷人。"
    }
];

const finalWords = {
    text: [`跟你聊天，做你的網站，`, `是我最近做過最開心的兩件事。`, `你這個人，真的很好。`],
    gold: "我是認真說的。 🌹"
};

const container = document.getElementById("main-scroll");
const exitBtn = document.getElementById("exit-btn");
const pwOverlay = document.getElementById("password-overlay");
const pwInput = document.getElementById("pw-input");

// 密碼驗證邏輯
pwInput.addEventListener('input', (e) => {
    if(e.target.value === '520') {
        pwOverlay.style.opacity = '0';
        setTimeout(() => {
            pwOverlay.style.display = 'none';
            container.style.visibility = 'visible';
            if(container.children[0]) container.children[0].classList.add('active');
        }, 1000);
    }
});

// 渲染頁面
albumData.forEach((item, index) => {
    let textPage = document.createElement('section');
    textPage.className = 'page';
    let textHtml = `<div class="text-content">`;
    item.text.forEach(line => textHtml += `<p>${line}</p>`);
    textHtml += `<span class="highlight">${item.gold}</span>`;
    if(item.first) textHtml += `<span class="audio-tip">建議開啟音樂，緩慢下滑</span>`;
    textHtml += `</div>`;
    textPage.innerHTML = textHtml;
    container.appendChild(textPage);

    let imgPage = document.createElement('section');
    imgPage.className = 'page';
    let img = new Image();
    img.src = item.img;
    imgPage.appendChild(img);
    container.appendChild(imgPage);
});

// 結尾頁
let finalPage = document.createElement('section');
finalPage.className = 'page';
let finalHtml = `<div class="text-content">`;
finalWords.text.forEach(line => finalHtml += `<p>${line}</p>`);
finalHtml += `<span class="highlight" style="font-size:20px;">${finalWords.gold}</span>`;
finalHtml += `</div>`;
finalPage.innerHTML = finalHtml;
container.appendChild(finalPage);

// 滾動監控
container.onscroll = () => {
    const activeIdx = Math.round(container.scrollTop / window.innerHeight);
    const children = Array.from(container.children);
    children.forEach((p, i) => {
        if(i === activeIdx) p.classList.add('active');
        else p.classList.remove('active');
    });
    
    // 總共 9 頁 (index 0-8)，最後一頁觸發忍住按鈕
    if(activeIdx >= 8) { 
        exitBtn.classList.add('triggered'); 
    } else { 
        exitBtn.classList.remove('triggered'); 
    }
};

const audio = document.getElementById("bgm");
const musicBtn = document.getElementById("music-toggle");
const playAction = () => {
    if(audio.paused) {
        audio.play().catch(()=>{});
        musicBtn.classList.add('playing');
        if(document.querySelector('.audio-tip')) document.querySelector('.audio-tip').style.opacity = 0;
    }
};
musicBtn.onclick = (e) => {
    e.stopPropagation();
    if(audio.paused) playAction();
    else { audio.pause(); musicBtn.classList.remove('playing'); }
};
document.addEventListener("click", playAction, {once: true});
</script>
</body>
</html>
